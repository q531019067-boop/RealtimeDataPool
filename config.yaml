pool:
  fetch_interval_sec: 30
  fetch_out_of_session: true
  concurrency_per_source: 8
  sources:
  - eastmoney
  - sina
  - tencent
  batch_size: 100
instruments:
  include_all_a_share: true
  include_etf: true
  extra_codes: []
  exclude_codes: []
  max_pool_size: 0
storage:
  db_path: data/rdp.db
  retention_days: 7
api:
  host: 0.0.0.0
  port: 5080
logging:
  level: INFO
  file: logs/rdp.log

# 反爬 / 礼貌请求参数
# jitter_ms: 每请求前随机 0~N ms 延迟。打破"齐刷刷整点请求"指纹。
#   0 = 关闭；30 = 轻度（约 +9s/周期开销）；50 = 中度；>100 不推荐。
# retry_max: 5xx/连接错误的最大重试次数。
fetcher:
  jitter_ms: 30
  retry_max: 1
